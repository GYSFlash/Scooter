spring.application.name=api-gateway
server.port=8080

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/user/**
spring.cloud.gateway.routes[0].predicates[1]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=scooter-service
spring.cloud.gateway.routes[1].uri=lb://scooter-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/scooter/**
spring.cloud.gateway.routes[1].predicates[1]=Path=/api/station/**

spring.cloud.gateway.routes[2].id=trip-service
spring.cloud.gateway.routes[2].uri=lb://trip-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/trips/**

spring.cloud.gateway.routes[3].id=push-service
spring.cloud.gateway.routes[3].uri=lb://push-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/push/**

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/